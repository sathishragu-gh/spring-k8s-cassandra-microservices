server.port: 8080
management.server.port: 8085
spring.application.name: gateway-service

management:
  endpoints:
    web:
      exposure:
        include: '*'

# Local routes — point directly to services running on localhost
spring:
  cloud:
    gateway:
      routes:
        - id: products_route
          uri: http://localhost:8083
          predicates:
            - Path=/api/products/**
        - id: orders_route
          uri: http://localhost:8081
          predicates:
            - Path=/api/orders/**
